<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>

    <!-- Header -->
    <header class="welcome-banner">
        <div class="container">
            <img src="images/banner.png" alt="Website Banner" width="300" height="150">
        </div>
    </header>

    <!-- Nav Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 justify-content-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Shopping Cart</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Products</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="main-content signup mt-4">
        <div class="container d-flex justify-content-center">
            <div class="card shadow-sm" style="width:100%; max-width:520px;">
                <div class="card-body">
                    <!-- tabs for login/signup -->
                    <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login"
                                type="button" role="tab" aria-controls="login" aria-selected="true">Login</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="signup-tab" data-bs-toggle="tab" data-bs-target="#signup"
                                type="button" role="tab" aria-controls="signup" aria-selected="false">Sign Up</button>
                        </li>
                    </ul>
                    <div class="tab-content" id="authTabsContent">
                        <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="login-tab">
                            <h2 class="card-title text-center mb-3">Welcome Back</h2>
                            <form id="loginForm" novalidate>
                                <div class="row mb-3">
                                    <label for="loginEmail" class="col-sm-4 col-form-label">Email:</label>
                                    <div class="col-sm-8">
                                        <input type="email" class="form-control" id="loginEmail" placeholder="Enter Email" required>
                                        <small class="text-danger d-none" id="loginEmailError"></small>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label for="loginPassword" class="col-sm-4 col-form-label">Password:</label>
                                    <div class="col-sm-8">
                                        <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                                        <small class="text-danger d-none" id="loginPasswordError"></small>
                                    </div>
                                </div>
                                <div class="text-center">
                                    <button type="submit" class="btn btn-primary px-5">Log in</button>
                                </div>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="signup" role="tabpanel" aria-labelledby="signup-tab">
                            <h2 class="card-title text-center mb-3">Create an Account</h2>
                            <form id="signupForm" novalidate>
                                <div class="row mb-3">
                                    <label for="username" class="col-sm-4 col-form-label">Username:</label>
                                    <div class="col-sm-8">
                                        <input type="text" class="form-control" id="username" placeholder="Enter Username" required>
                                        <small class="text-danger d-none" id="usernameError"></small>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label for="email" class="col-sm-4 col-form-label">Email:</label>
                                    <div class="col-sm-8">
                                        <input type="email" class="form-control" id="email" placeholder="Enter Email" required>
                                        <small class="text-danger d-none" id="emailError"></small>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label for="password" class="col-sm-4 col-form-label">Password:</label>
                                    <div class="col-sm-8">
                                        <input type="password" class="form-control" id="password" placeholder="Enter Password" required>
                                        <small class="text-danger d-none" id="passwordError"></small>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label for="confirmPassword" class="col-sm-4 col-form-label">Confirm Password:</label>
                                    <div class="col-sm-8">
                                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm Password" required>
                                        <small class="text-danger d-none" id="confirmError"></small>
                                    </div>
                                </div>
                                <div class="text-center">
                                    <button type="submit" class="btn btn-primary px-5">Sign-up</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="website-terms">
        <div class="container">
            <p><a href="">Terms of Use</a></p>
            <p><a href="">Cookie and Privacy Policy</a></p>
            <p><a href="">Copyright</a></p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
